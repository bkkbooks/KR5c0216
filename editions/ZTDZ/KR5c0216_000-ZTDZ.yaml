front:
  text: 太上養生胎息氣經盡四上清道德并黄庭經養生要集人能依此去萬病通上清神仙凡服氣法存心如嬰兒在母胎十月成就筋骨和柔以㝠心息念和氣自至呼吸如法咽之不飢百毛孔開入息不擁滯常取六陽時食生氣氣力日増
  hash: sha256:6f458fa35891e52ee6ae9288a42e0d843c19e695921cf51959aaa26e526244b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0216_SJB_000-180401a, image: sjb/18/180401a.png}
body:
  text: 六陽時法夜半子時服九九八十一平旦寅時服八八六十四食時辰時服七七四十九正中午時服六六三十六晡時申時服五五二十五黄昏戍時服四四一十六夫服氣舌須玄玄須依門户出入鼻爲天門服氣魂魄歸天門口爲地户服氣魂魄歸地户黄庭經曰百穀之實土地精五味外美邪魔腥玉池清水灌靈根子能修之補命門欲獲長生從鼻入口出即爲順氣修依此眞心不輟下却三尸捨榮去愛日漸成功然始近道凡眞人本性幽閑用心清雅發言合道心行無瑕漱咽靈津腹中百味自足通三焦理正氣氣自周遍大通五藏骨髓堅溢夫道爲萬氣之主道者氣也氣爲精門人若守精如屋有人其量百世人若無精如屋無人禍及其世氣者保於精精者氣也精氣兩全是曰眞人人有三丹田上丹田泥丸腦赤帝子卿字元先中丹田心眞人光堅字子丹下丹田嬰兒谷玄字元陽子氣精門也三宮各有三神神舒氣漏氣漏精泄精泄即神丧精者妙物眞人長生根長生根者氣之位精全氣全精泄氣泄唯精與氣須保全眞先賢至道愛氣保精而能長生夫色動於情制不自由安能固哉此一傾危如山崩海竭山者氣之寳寳者腎也腎爲命根根無精則葉痿葉痿則枝朽枝朽則身枯矣思欲再生焉能救也凡入氣為隂出氣爲陽此二者服日月精華氣者虚无虛无者自然無為無爲者心不動也外無求内自然安靜安靜則神定神定即氣和氣和即元氣自至元氣自至即五藏滋潤五藏滋潤即百脉通流百脉通流即津液上應津液上應即不思五味無飢渴延年却老氣化爲血血化爲髓一年易氣二年易血三年易脉四年易肉五年易髓六年易筋七年易骨八年易髮九年易形爲眞人鍊九還巳通神仙玄妙不可具載上清氣祕法東方青牙青牙者肝服食青牙飮以朝華朝華上齒根也以舌表砥唇漱而咽之南方朱丹朱丹者心服食朱丹飲以丹池丹池者下齒根以舌表攪齒根漱而咽之西方明石明石者肺服食明石飲以靈液靈液者唇裹津以舌攪齒七匝漱而咽之北方玄滋玄滋者賢服食玄滋飲以玉飴王飴者舌以鼻導引元氣入口呼吸而咽之中央戊巳昂昂太山太山者守精也服食精氣飲以醴泉醒泉在齒根玄膺前華池在舌本下一名玉英又名金梁巳上漱而咽之各三通也凡服氣法常以夜半子時寅時起正衣冠以金梁叩玉英調華泄漱醴泉及靈液縮鼻還之上至頭下引入口中變爲王泉引氣至於舌根咽而送之令喉中鳴腹中鳴引氣入丹田如兒生能啼謂長生根也飢食目然氣渴飲華池漿使長飽也上清法精是吾神氣是吾道畜精養神飲氣芳香謂嬰兒在胞中幽隱握固隂成其形謂鍊精補腦一名鍊形漱滿津液口中五味皆至朝食陽暮食隂五藏生靈芝玉英視人從表知裏神儀清朗須仰排水藏覆排食藏次倚壁翹一足拳兩手以舌攪口中候津液滿口即想氣咽入臍至脚爲度徹視腸胃指能吹燈謂九九八十一天地之终始能鍊九還即血化為精精化為筋筋化為玉玉變仙骨此得自然目視千里得之為身之祕寳延年却老乘雲駕鶴登仙可翹足而待之非其氣像不合道者勿傳謂泄漏靈文傳之非道九族受殃凡咽氣用力閑口舉舌令舌下空名咽元氣日日减食朝朝進氣時時飮好酒一盃謂初學人天地之間聖人在其中得其道也不智不道不仁在其中得其殃立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義天地含精萬物化生道不可以情求不可以語詰萬物任天歸乎自然矣檢時含景補瀉圖聖人欲得長生房中之事能殺人我命在我有萬病者皆由恣意不知保惜今人唯知服藥不知愛保精髓保精髓者以致延命飲玉泉即玄液也禀八尺之質含萬有之心生命之器靈祕長生之術如寶守之安神鍊形履水不溺入火不焚謂氣運於内神應於外淘鍊五藏吐納補瀉眞元肺藏圖用呬爲瀉呼爲補夫肺兊之氣金之精其色白肺主魄化為玉童長七寸白獸其神存其形全肺合大腸上主鼻多怖懼魄離肺也不耐寒肺薄顔色鮮白肺無他病大腸鳴氣擁也頻嘘不祥肺主七宫京門立秋日平旦面正西坐鳴天䜴七通飲玉泉漿三嚥瞑目正思兊宮白氣入口吞之三則童神安百邪不能殃兵刃不能害延年益夀謂補瀉神氣安息靈魄心藏圖用呵爲瀉嘘爲補夫心者離之氣火之精其色赤其神朱雀化為玉女長八寸欲安其神而全其形合乎中和心合小腸主血脉上主舌血擁驚舌不知味心亂多嘘心主九宫驚門和而形全立夏日平旦面向南端坐叩金梁九通潄玄泉三咽精思注想吸離宫赤氣入口三吞以補靈府離玉女神平體安百殃不害神至靈也肝藏圖用噓為瀉吹爲補夫肝震之氣木之精其色青肝主魂其神如龍化爲二玉童一青一黄各長七寸一負龍一持王漿欲安其齡合乎太清肝合乎腠理上主目目熱肝傷也肝主春用事含春精氣萬物䌓茂順陽之道立春日常以寅時面向東平坐叩齒三通閉氣七息吸震宫青氣三吞之致二童肝養精之妙也脾藏圖用呼爲瀉呵爲補夫脾者坤之氣土之精其色黄像覆盆其神如鳳化爲玉女長六寸合太隂上主口顔色濕潤無他也脾無定位寄王四季各一十八日清旦正坐中宫禁忌五息鳴天鼓七吸中宫黄氣入口吞之飲玉醴以致其妙人禀天道經營正氣守我房中之精保命得長生存想華池飲玉液和氣相勝百脉調暢閉息精源含眞却老此名守眞長生祕訣腎藏圖用吹爲瀉咽爲補夫腎主精坎之氣其色黑其像圓一名而曲其神如白鹿化爲玉童長一尺萬物治其精順其志全其眞合乎太清腎合骨上主耳腰不能伸腎冷立冬日面北向平旦坐鳴金梁五通飲玉泉三吸玄宫黑氣吞之以致玉童之饌神和體平而能長生矣膽藏圖用嘻爲瀉嘘爲補夫膽金之精水之氣其色青其神如龜化爲玉女長一尺其神勇膽合膀胱顔貌青無其他常以孟月端坐正思北玄吸黑氣入口九吞飲玉泉之漿氣之致也喜怒損性哀樂傷神神傷侵命損性害生養性以生氣保神以安心氣平體和精全心逸此鍊眞祕言靈寳長生之訣夫氣爲身之主主之者守精精是身之至道通神仙精是命根保精重氣而能長生道之宗也人自失道非道失人凡服氣靜室安坐寂然瞑目努腹鼓腮令氣滿口即氣腸開叩齒嚥之九下爲一息春夏服冷氣秋冬服暖氣毎夜至五更即以兩掌掩口著力掌中取津液拭摩面皮光澤時時含棗蜜湯助之日日減食朝朝進氣氣即易成凡修行切勿令人知人知即我生我生即名至名至即禍來禍來即不安至道性餘至静則廉知之修鍊謂之正眞玉不琢不成器人不學不知道水性不雜即清不動即平謂之眞性抱一閑曠寂然外無内虛互道无爲无所不爲虚无合體自然合眞湛然長久夫大道法又象地古人述古從凡入聖而變仙骨呼吸隂陽胎息日月閉口含虛合口上下靈液自至徐徐嚥之學道之人服氣猶如世人思食道即成矣道法内修可保全形全道安神仙道有異真人至道道自依人人能弘道非道弘人氣道髙妙而獲長生凡咽氣皆連三咽二乾一濕乾謂雲行濕謂兩施順天之道鼻引氣魂魄歸天門口嗜五味魂魄歸地户又云鼻通玉池上清口通人門太和漱滿靈液五藏清爽玄妙之道不遺萬物萬物自生氣爲百行自成氣之道道其生也若勞其死也若休而不休曰弊精用不巳曰勞勞即竭竭即死所謂純一而不雜静一而不變此養道氣之至純素之道與神爲一一眞人所謂自然氣可以和六腑寧心神使得長生此文不死之道子有仙相得吾氣經内有黃庭眞人中華玉女扶桑大帝君得之鏤金書鍊眞之祕言焉太上養生胎息氣經終
